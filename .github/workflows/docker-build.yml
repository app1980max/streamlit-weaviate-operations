name: Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weaviate-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/weaviate-dashboard:${{ github.sha }}

      # ✅ Kubernetes steps MUST be here
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Test cluster
        run: kubectl get svc

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f deploy/weaviate-dashboard.yaml

      - name: Update deployment image and rollout
        run: |
          set -e
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/weaviate-dashboard:${{ github.sha }}
          kubectl set image deployment/weaviate-dashboard webapp=$IMAGE -n weaviate
          kubectl rollout status deployment/weaviate-dashboard -n weaviate --timeout=180s
          
      - name: Verify deployment
        run: |
          kubectl get deployment weaviate-dashboard -n weaviate
          kubectl get pods -l app=weaviate-dashboard -n weaviate
