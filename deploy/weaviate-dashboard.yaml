apiVersion: apps/v1
kind: Deployment
metadata:
  name: weaviate-dashboard
  namespace: weaviate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weaviate-dashboard
  template:
    metadata:
      labels:
        app: weaviate-dashboard
    spec:
      containers:
        - name: webapp
          image: virtapp/weaviate-dashboard:latest
          ports:
            - containerPort: 8501
          env:
            - name: WEAVIATE_URL
              value: "http://weaviate.weaviate.svc.cluster.local:80"

---

apiVersion: v1
kind: Service
metadata:
  name: weaviate-dashboard
  namespace: weaviate
spec:
  selector:
    app: weaviate-dashboard
  ports:
    - port: 80
      targetPort: 8501
  type: ClusterIP

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-route-weaviate-dashboard
  namespace: weaviate
  annotations:
    kubernetes.io/ingress.class: nginx
    #nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
    - hosts:
        - weaviate-ui.appflex.io
      secretName: weaviate-dashboard-tls
  rules:
    - host: weaviate-ui.appflex.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weaviate-dashboard
                port:
                  number: 80
                  
